name: CI - On Release

on:
  release:
    types: [published]
  workflow_dispatch:
  push:

jobs:
  get_changed_icons:
    name: Get changed icons
    runs-on: ubuntu-latest
    outputs:
      BODY: ${{ steps.get-changed-icons.outputs.body }}
      conventional-commit: ${{ steps.get-changed-icons.outputs.conventional-commit }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: actions/setup-node@v4
      - run: yarn install --immutable
      - run: yarn run build
      - name: Get changed icons
        id: get-changed-icons
        uses: ./.github/get_changed_icons

  publish:
    name: Publish to NPM
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{github.ref_name}}

      - name: Log environment variables
        run: env | sort

      - name: Log Node and Yarn versions
        run: |
          node --version
          npm --version
          yarn --version

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      - name: Inject auth token
        run: |
          echo npmAuthToken: "${{secrets.NPM_TOKEN}}" >> ./.yarnrc.yml

      - name: Log .yarnrc.yml
        run: cat .yarnrc.yml

      - name: Install packages
        run: yarn install --immutable

      - name: Compile Typescript files
        run: tsc

      - name: Log package.json
        run: cat package.json

      - name: Dry run
        run: npx figma connect publish --dry-run --token ${{ secrets.FIGMA_PERSONAL_ACCESS_TOKEN}}

      - name: Pack
        run: npm pack

      - name: List files after pack
        run: ls -l

      - name: Publish
        run: npm publish --access=public --dry-run
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

